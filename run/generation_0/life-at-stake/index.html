<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chess Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Chess</h1>
    <div class="board-container">
      <canvas id="chessCanvas"></canvas>
    </div>
    <div class="controls">
      <button class="btn btn-new-game" onclick="if(window.chessGame) window.chessGame.resetGame()">New Game</button>
      <button class="btn btn-flip" onclick="if(window.chessGame) { window.chessGame.flipped = !window.chessGame.flipped; window.chessGame.render(); }">Flip Board</button>
    </div>
    <div class="game-info">
      <p>White: You | Black: AI</p>
    </div>
  </div>
  
  <script src="js/chess.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
