<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess - Prototype 2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.container {
  text-align: center;
}
h1 {
  color: #e0e0e0;
  margin-bottom: 12px;
  font-weight: 300;
  letter-spacing: 2px;
  font-size: 24px;
}
canvas {
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  cursor: pointer;
}
.status {
  margin-top: 16px;
  color: #b0b0b0;
  font-size: 18px;
  font-weight: 300;
  min-height: 30px;
}
.promotion-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 100;
}
.promotion-dialog {
  background: #2a2a3e;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  display: flex;
  gap: 12px;
}
.promotion-btn {
  width: 60px;
  height: 60px;
  font-size: 40px;
  border: 2px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  background: #3a3a4e;
  color: #fff;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.promotion-btn:hover {
  border-color: #f0d9b5;
  background: #4a4a5e;
  transform: scale(1.1);
}
</style>
</head>
<body>
<div class="container">
  <h1>♚ CHESS</h1>
  <canvas id="board"></canvas>
  <div class="status" id="status"></div>
</div>
<div class="promotion-overlay" id="promotionOverlay">
  <div class="promotion-dialog" id="promotionDialog"></div>
</div>
<script src="chess.js"></script>
</body>
</html>
