<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chess - Prototype 3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  -webkit-user-select: none;
  user-select: none;
}
.container {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
h1 {
  color: #e0e0e0;
  margin-bottom: 8px;
  font-weight: 300;
  letter-spacing: 2px;
  font-size: 22px;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 480px;
  margin-bottom: 8px;
}
.player-info {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #b0b0b0;
  font-size: 14px;
  padding: 4px 12px;
  border-radius: 6px;
  background: rgba(255,255,255,0.05);
}
.player-info.active {
  background: rgba(240,217,181,0.15);
  color: #f0d9b5;
}
.player-info .piece-icon {
  font-size: 20px;
}
canvas {
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  cursor: pointer;
  max-width: 100%;
  height: auto;
}
.status {
  margin-top: 12px;
  color: #b0b0b0;
  font-size: 16px;
  font-weight: 300;
  min-height: 24px;
}
.promotion-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 100;
}
.promotion-dialog {
  background: #2a2a3e;
  padding: 16px;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  display: flex;
  gap: 8px;
}
.promotion-btn {
  width: 56px;
  height: 56px;
  font-size: 36px;
  border: 2px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  background: #3a3a4e;
  color: #fff;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.promotion-btn:hover {
  border-color: #f0d9b5;
  background: #4a4a5e;
  transform: scale(1.08);
}
.ai-thinking {
  color: #888;
  font-size: 14px;
  min-height: 20px;
  margin-top: 4px;
}
.new-game-btn {
  margin-top: 10px;
  padding: 8px 24px;
  background: #b58863;
  color: #1a1a2e;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  display: none;
}
.new-game-btn:hover {
  background: #d4a574;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="player-info active" id="whiteInfo">
      <span class="piece-icon">♔</span>
      <span>White (You)</span>
    </div>
    <h1>♚ CHESS</h1>
    <div class="player-info" id="blackInfo">
      <span>AI</span>
      <span class="piece-icon">♚</span>
    </div>
  </div>
  <canvas id="board"></canvas>
  <div class="status" id="status"></div>
  <div class="ai-thinking" id="aiThinking"></div>
  <button class="new-game-btn" id="newGameBtn">New Game</button>
</div>
<div class="promotion-overlay" id="promotionOverlay">
  <div class="promotion-dialog" id="promotionDialog"></div>
</div>
<script src="chess.js"></script>
</body>
</html>
