<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess - Personality</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background: linear-gradient(180deg, #0c0c1e 0%, #1a1a3e 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    h1 {
      color: #7c3aed;
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 4px;
    }
    canvas {
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(124, 58, 237, 0.3);
    }
    #status {
      color: #a78bfa;
      font-size: 1rem;
      font-weight: 300;
    }
    #engine-info {
      color: #666;
      font-size: 0.8rem;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>CHESS</h1>
    <canvas id="board"></canvas>
    <div id="status">White to move</div>
    <div id="engine-info"></div>
  </div>
  <script type="module" src="/src/game.js"></script>
</body>
</html>
