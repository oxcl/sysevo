<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess - Prototypist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    h1 {
      color: #58a6ff;
      font-size: 2rem;
    }
    canvas {
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    #status {
      color: #8b949e;
      font-size: 1.1rem;
    }
    #prototype-info {
      color: #484f58;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Chess</h1>
    <canvas id="board"></canvas>
    <div id="status">White to move</div>
    <div id="prototype-info">Prototype 9 - Final</div>
  </div>
  <script type="module" src="/src/game.js"></script>
</body>
</html>
