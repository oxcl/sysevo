<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess - Threatened</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    h1 {
      color: #ef4444;
      font-size: 2rem;
      font-weight: 700;
    }
    canvas {
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(239, 68, 68, 0.3);
    }
    #status {
      color: #fca5a5;
      font-size: 1.1rem;
    }
    #performance {
      color: #666;
      font-family: monospace;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>CHESS</h1>
    <canvas id="board"></canvas>
    <div id="status">White to move</div>
    <div id="performance">60fps | 0ms avg</div>
  </div>
  <script type="module" src="/src/game.js"></script>
</body>
</html>
